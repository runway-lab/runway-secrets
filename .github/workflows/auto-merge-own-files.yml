name: auto-merge own-files

# Auto-merges PRs whose every change is either:
#   secrets/<github.actor>.env.enc   (add/modify your own secret)
#   recipients/<github.actor>.age.pub (add/modify/rename your own pubkey)
#
# Any other path → workflow exits cleanly without enabling --auto, so the
# PR sits waiting for an admin to review and `gh pr merge --admin` if
# intentional. This is the only safety layer enforcing "intern X can only
# touch their own files" in this repo.
on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  gate:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    outputs:
      ok: ${{ steps.scope.outputs.ok }}
    steps:
      - name: Verify every change is owned by the PR author
        id: scope
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          PR_LOGIN: ${{ github.event.pull_request.user.login }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          mapfile -t entries < <(
            gh api "repos/$REPO/pulls/$PR/files" --paginate \
              --jq '.[] | "\(.status) \(.filename) \(.previous_filename // "")"'
          )

          if [ ${#entries[@]} -eq 0 ] || [ -z "${entries[0]:-}" ]; then
            echo "::warning::PR touches no files; skipping auto-merge."
            exit 0
          fi

          allowed_secret="secrets/${PR_LOGIN}.env.enc"
          allowed_pubkey="recipients/${PR_LOGIN}.age.pub"

          ok=true
          for entry in "${entries[@]}"; do
            status=$(echo "$entry" | awk '{print $1}')
            path=$(echo "$entry"   | awk '{print $2}')
            prev=$(echo "$entry"   | awk '{print $3}')

            allowed=false
            case "$status:$path" in
              added:"$allowed_secret"|modified:"$allowed_secret")
                allowed=true ;;
              added:"$allowed_pubkey"|modified:"$allowed_pubkey")
                allowed=true ;;
              renamed:"$allowed_secret")
                # Only allow rename from another *own* path (unusual but
                # let's not block legitimate self-renames).
                [ "$prev" = "$allowed_secret" ] && allowed=true ;;
              renamed:"$allowed_pubkey")
                [ "$prev" = "$allowed_pubkey" ] && allowed=true ;;
              removed:*)
                # Self-removal of your own files is allowed but rare;
                # admins typically curate this. Disallow to keep the
                # path simple — admin can --admin merge if intentional.
                allowed=false ;;
            esac

            if [ "$allowed" != "true" ]; then
              echo "::notice::PR touches $status $path which is not owned by $PR_LOGIN (allowed: $allowed_secret or $allowed_pubkey, added/modified). Skipping auto-merge; admin review required."
              exit 0
            fi
          done

          echo "ok=true" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge
        if: steps.scope.outputs.ok == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: gh pr merge "$PR" --repo "$REPO" --squash --auto --delete-branch
